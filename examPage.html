<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exam Question</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;700;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <nav id="nav2">
        <div class="nav-logo">
            <img src="assest/logo.svg">
            <p>the exam</p>
        </div>
        <div class="nav-icon">
            <div class="timer">
                <p id="timer">1:00</p>
            </div>
            <img id="loginIcon" src="assest/login.svg">
            <button id="nav-btn-mark">
                <img src="assest/mark.svg">
            </button>

        </div>
    </nav>
    <div class="form_mark">
        <form>
            <div class="exam">

                <div id="questionExam">

                </div>



                <div class="pagebottom">
                    <div class="pagination">
                        <button type="button" class="prev hid" id="prevbtn">previous</button>
                        <div class="pageNum">
                            <span><span id="currentnumber">1</span>/<span id="allnumber">20</span></span>
                        </div>
                        <button type="button" class="next" id="nextbtn">next</button>
                    </div>
                    <div class="mark" id="mark">

                        <img src="assest/mark2.svg">
                        <p>Mark for review</p>

                    </div>
                </div>

            </div>

            <button type="button" class="submit" id="submit"><img class="imgSubmit" src="assest/Iconsubmit.svg">Submit Exam</button>
        </form>

        <div id="mark-side">
          
        </div>
    </div>
    <script src="exam.js"></script>
</body>

</html>
