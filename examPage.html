<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exam Question</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;700;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body class="exam-page exam-page-marked">
    <div class="exam-progress">
        <div class="exam-progress-fill"></div>
    </div>

    <header class="header exam-header">
        <div class="brand-wrap">
            <div class="brand-icon-wrap">
                <img src="https://www.figma.com/api/mcp/asset/59080367-5101-457b-97b0-c119a88c1d10"
                    alt="The Exam logo" />
            </div>
            <h1 class="brand-title">The Exam</h1>
        </div>

        <div class="exam-header-right">
            <div class="exam-time-wrap">
                <span class="exam-time-label">Time Remaining</span>
                <span class="exam-time-value">6:12</span>
            </div>

            <button class="exam-profile-btn" type="button" aria-label="Profile">
                <img src="https://www.figma.com/api/mcp/asset/b5bdc3ba-28bd-47d1-89da-673fcd29a64f" alt="Profile" />
            </button>

            <button id="markedToggleBtn" class="exam-bookmark-btn" type="button" aria-label="Toggle marked questions"
                aria-controls="markedPanel" aria-expanded="false">
                <img src="https://www.figma.com/api/mcp/asset/05fcff8f-a819-46d7-a028-f3a45799ce3b" alt="Bookmark" />
            </button>
        </div>
    </header>

    <main id="examMainMarked" class="exam-main exam-main-marked">
        <div class="exam-left-pane">
            <section class="exam-question-card" aria-label="Question card">
                <div class="exam-question-head">
                    <span class="exam-badge">Multiple Choice</span>
                    <h2>I wish I _______ those words. But now it's too late.</h2>
                </div>

                <div class="exam-options" role="radiogroup" aria-label="Question answers">
                    <label class="exam-option" for="q1-option1">
                        <input class="exam-option-input" type="radio" id="q1-option1" name="question-1"
                            value="not-having-said" />
                        <span class="exam-radio"></span>
                        <span>not having said</span>
                    </label>

                    <label class="exam-option" for="q1-option2">
                        <input class="exam-option-input" type="radio" id="q1-option2" name="question-1"
                            value="have-never-said" />
                        <span class="exam-radio"></span>
                        <span>have never said</span>
                    </label>

                    <label class="exam-option" for="q1-option3">
                        <input class="exam-option-input" type="radio" id="q1-option3" name="question-1"
                            value="never-said" />
                        <span class="exam-radio"></span>
                        <span>never said</span>
                    </label>

                    <label class="exam-option" for="q1-option4">
                        <input class="exam-option-input" type="radio" id="q1-option4" name="question-1"
                            value="had-never-said" checked />
                        <span class="exam-radio"></span>
                        <span>had never said</span>
                    </label>
                </div>

                <div class="exam-question-footer">
                    <div class="exam-left-controls">
                        <div class="exam-question-count">
                            <span class="exam-count-current">1</span>
                            <span class="exam-count-total">/ 20</span>
                        </div>

                        <button class="exam-nav-btn" type="button">
                            <img src="https://www.figma.com/api/mcp/asset/21b89ef6-3fd9-4f99-90c8-e702200d760e"
                                alt="Previous" />
                            <span>Previous</span>
                        </button>

                        <button class="exam-nav-btn" type="button">
                            <span>Next</span>
                            <img src="https://www.figma.com/api/mcp/asset/920365d9-6211-49c6-911c-18cf461e9f25"
                                alt="Next" />
                        </button>
                    </div>

                    <button class="exam-mark-btn" type="button">
                        <img src="https://www.figma.com/api/mcp/asset/756228ab-cbef-4040-9228-16644cccbe00"
                            alt="Mark" />
                        <span>Mark for review</span>
                    </button>
                </div>
            </section>

            <button class="exam-submit-btn" type="button">
                <img src="https://www.figma.com/api/mcp/asset/14150841-52df-4ca0-8d56-184a87b67c93" alt="Submit" />
                <span>Submit Exam</span>
            </button>
        </div>

        <aside id="markedPanel" class="exam-marked-panel is-hidden" aria-label="Marked Questions">
            <div class="exam-marked-head">
                <img src="https://www.figma.com/api/mcp/asset/750b84ee-47dd-497d-b0fc-012bc5a71ea1" alt="Marked" />
                <h3>Marked Questions</h3>
            </div>

            <div class="exam-marked-list">
                <button class="exam-marked-item" type="button">
                    <span>mrk-Question 2</span>
                    <img src="https://www.figma.com/api/mcp/asset/705d1168-0f65-4ceb-b74d-1dcba766b677" alt="Open" />
                </button>

                <button class="exam-marked-item" type="button">
                    <span>mrk-Question 4</span>
                    <img src="https://www.figma.com/api/mcp/asset/705d1168-0f65-4ceb-b74d-1dcba766b677" alt="Open" />
                </button>

                <button class="exam-marked-item" type="button">
                    <span>mrk-Question 5</span>
                    <img src="https://www.figma.com/api/mcp/asset/705d1168-0f65-4ceb-b74d-1dcba766b677" alt="Open" />
                </button>
            </div>
        </aside>
    </main>

    <footer class="footer exam-footer">© 2024 The Exam Inc. All rights reserved.</footer>

    <script>
        const markedToggleBtn = document.getElementById("markedToggleBtn");
        const markedPanel = document.getElementById("markedPanel");
        const answerInputs = document.querySelectorAll(".exam-option-input");

        if (markedToggleBtn && markedPanel) {
            markedToggleBtn.addEventListener("click", () => {
                const isHidden = markedPanel.classList.toggle("is-hidden");
                markedToggleBtn.classList.toggle("exam-bookmark-btn-active", !isHidden);
                markedToggleBtn.setAttribute("aria-expanded", String(!isHidden));
            });
        }

        const syncSelectedAnswerStyles = () => {
            document.querySelectorAll(".exam-option").forEach((option) => {
                const optionInput = option.querySelector(".exam-option-input");
                const optionRadio = option.querySelector(".exam-radio");
                const isChecked = Boolean(optionInput && optionInput.checked);

                option.classList.toggle("exam-option-selected", isChecked);
                if (optionRadio) {
                    optionRadio.classList.toggle("exam-radio-selected", isChecked);
                }
            });
        };

        answerInputs.forEach((input) => {
            input.addEventListener("change", syncSelectedAnswerStyles);
        });

        syncSelectedAnswerStyles();
    </script>
</body>

</html>
