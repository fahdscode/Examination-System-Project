<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="both">
        <navbar>
        <div class="nav">
            <img src="assest/logo.svg">
            <p>the exam</p>
        </div>
    </navbar>
    <aside id="register">

        <form id="regist">
            <div class="container">
                <div id="title">
                    <h1>welcome back</h1>
                    <p>please enter your datails to sign in</p>
                </div>
                <label for="email">Email</label>
                <div class="email">
                    <img  src="assest/Container.svg">
                    <input id="email" type="email" required placeholder="user@example.com" />
                </div>

                <label for="password">password</label>
                <div class="password">
                    <img  src="assest/Icon.svg">
                    <input id="password" type="password" />
                </div>
                
                <button>sign in</button>
            </div>

        </form>
    </aside>
</div>

</body>

</html>
