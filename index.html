<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;700;900&display=swap"
        rel="stylesheet" />
</head>

<body>
<div class="both">
        <navbar>
        <div class="nav">
            <img src="assest/logo.svg">
            <p>the exam</p>
        </div>
    </navbar>
    <aside id="register">

        <form id="regist">
            <div class="container">
                <div id="title">
                    <h1>Create Your Account</h1>
                </div>


                <label for="fname">first name</label>

                <input id="fname" type="text"  />

                <label for="lname">last name</label>
                <input id="lname" type="text"  />
                <label for="email">Email</label>
                <div class="email">
                    <img  src="assest/Container.svg">
                    <input id="email" type="email"  placeholder="user@example.com" />
                </div>

                <label for="password">password</label>
                <div class="password">
                    <img  src="assest/Icon.svg">
                    <input id="password" type="password" />
                </div>
                <label for="repass">re-enter password</label>
                <div class="repass">
                    <img src="assest/repassword.svg">
                    <input id="repass" type="password" />
                </div>
                <button id="btnregister" >register account</button>
            </div>

        </form>


    </aside>
</div>

<script type="module" src="main.js"></script>
</body>

</html>
